<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BAMBITCH Zakk</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ff149d;
  --pink2:#ff4fc3;
  --gold:#ffd166;
  --glow-pink:0 0 10px #ff149d,0 0 30px #ff149d,0 0 60px rgba(255,20,157,.7);
  --glow-gold:0 0 10px #ffd166,0 0 25px rgba(255,209,102,.8);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  color:#fff;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,20,157,.25), transparent 30%),
    linear-gradient(180deg,#08000a,#050006,#010001);
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.2;
}

/* HEADER */
.header{
  position:sticky;top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 5vw;
  background:rgba(5,0,6,.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,20,157,.4);
}

.logo-mark{
  width:40px;height:40px;
  display:grid;place-items:center;
  border:1px solid var(--pink);
  border-radius:50%;
  box-shadow:var(--glow-pink);
}

/* HERO */
.hero{
  min-height:720px;
  display:grid;
  align-items:center;
  padding:80px 5vw;
  position:relative;
}

.hero-inner{
  max-width:700px;
  padding:20px;
}

h1{
  font-size:clamp(60px,10vw,140px);
  color:var(--gold);
  text-shadow:0 0 20px var(--gold),0 0 40px var(--pink);
}

.subtitle{
  font-size:clamp(24px,4vw,48px);
  color:var(--pink2);
  font-weight:900;
  text-shadow:var(--glow-pink);
}

/* BUTTON */
.btn{
  display:inline-flex;
  padding:14px 22px;
  border:1px solid var(--pink);
  color:#fff;
  text-decoration:none;
  box-shadow:var(--glow-pink);
  margin-right:10px;
}

/* CARDS */
.card{
  background:rgba(10,0,12,.75);
  border:1px solid rgba(255,20,157,.6);
  border-radius:10px;
  padding:20px;
  box-shadow:0 0 25px rgba(255,20,157,.15);
}

/* MOBILE */
@media(max-width:900px){
  h1{font-size:60px}
}
</style>
</head>

<body>

<header class="header">
  <div class="logo-mark">♥</div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>BAMBITCH</h1>
    <div class="subtitle">HENTAI BAR</div>

    <a class="btn" href="#reservation">RESERVE</a>
    <a class="btn" href="#access">ACCESS</a>
  </div>
</section>

</body>
</html>
